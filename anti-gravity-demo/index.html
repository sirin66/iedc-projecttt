<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti-Gravity Broadcast Feed</title>
  <!-- Google Fonts Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #030308;
      --card-bg: rgba(255, 255, 255, 0.03);
      --cyan-neon: #00f0ff;
      --purple-neon: #a020f0;
      --text-main: #f0f0ff;
      --text-muted: rgba(240, 240, 255, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #0e0821 0%, var(--bg-dark) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating stars/dots background effect */
    .space-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: floatStar 10s infinite ease-in-out;
      opacity: 0.3;
    }

    @keyframes floatStar {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-30px) scale(1.2); opacity: 0.8; }
    }

    /* Ambient Blur Glows */
    .glow-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(150px);
      z-index: 2;
      pointer-events: none;
    }

    .glow-purple {
      top: -100px;
      right: -100px;
      background: rgba(160, 32, 240, 0.1);
    }

    .glow-cyan {
      bottom: -150px;
      left: -100px;
      background: rgba(0, 240, 255, 0.08);
    }

    /* Anti-Gravity Floating Card */
    .floating-card-container {
      position: relative;
      z-index: 10;
      padding: 20px;
      animation: floatCard 6s ease-in-out infinite;
    }

    /* Anti-Gravity Floating Card Keyframes */
    @keyframes floatCard {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-25px) rotate(1.5deg);
        box-shadow: 0 35px 60px rgba(0, 240, 255, 0.15);
      }
      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    .glass-card {
      width: 440px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 40px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow: 
        0 15px 35px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
      transition: all 0.5s ease;
    }

    /* Dynamic Border Gradient glow decoration */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--cyan-neon), var(--purple-neon));
    }

    /* Pulse wave effect around the card */
    .pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border: 1px solid rgba(0, 240, 255, 0.1);
      border-radius: 32px;
      pointer-events: none;
      animation: pulseWave 4s infinite linear;
      z-index: 5;
    }

    @keyframes pulseWave {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
    }

    /* Content Styling */
    .card-meta {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--cyan-neon);
      margin-bottom: 15px;
      display: inline-block;
      border: 1px solid rgba(0, 240, 255, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(0, 240, 255, 0.05);
    }

    .payload-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 15px;
      color: #fff;
      line-height: 1.2;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    .payload-message {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    .system-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--cyan-neon);
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--cyan-neon);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--cyan-neon);
      animation: blinkDot 1.5s infinite ease-in-out;
    }

    @keyframes blinkDot {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Admin link back indicator */
    .admin-indicator {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s;
      z-index: 100;
    }

    .admin-indicator:hover {
      color: var(--cyan-neon);
    }
  </style>
</head>
<body>

  <!-- Floating Star Background Elements -->
  <div class="space-field" id="spaceField"></div>

  <!-- Space Ambient Glows -->
  <div class="glow-orb glow-purple"></div>
  <div class="glow-orb glow-cyan"></div>

  <!-- Zero-Gravity Drifting Card Container -->
  <div class="floating-card-container">
    <div class="pulse-ring"></div>
    <div class="glass-card">
      <span class="card-meta">Orbital Telemetry</span>
      <h2 class="payload-title" id="displayTitle">Payload Static</h2>
      <p class="payload-message" id="displayMessage">No orbital coordinates loaded yet. Please configure the broadcast transmission in the control console panel.</p>
      
      <div class="system-status">
        <span class="status-dot"></span>
        <span>STATION RECEIVER ONLINE</span>
      </div>
    </div>
  </div>

  <a href="admin.html" class="admin-indicator">LAUNCH CONTROL PANEL</a>

  <script>
    // Create floating backdrop stars dynamically
    const spaceField = document.getElementById("spaceField");
    for (let i = 0; i < 40; i++) {
      const star = document.createElement("div");
      star.className = "star";
      star.style.width = star.style.height = `${Math.random() * 3 + 1}px`;
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.animationDelay = `${Math.random() * 8}s`;
      spaceField.appendChild(star);
    }

    // Function to fetch from LocalStorage and update card UI
    function updateDisplayPayload() {
      const dataStr = localStorage.getItem("gravity_orbital_payload");
      const titleEl = document.getElementById("displayTitle");
      const messageEl = document.getElementById("displayMessage");
      const card = document.querySelector(".glass-card");

      if (dataStr) {
        try {
          const payload = JSON.parse(dataStr);
          titleEl.textContent = payload.title || "ZERO GRAVITY ACTIVE";
          messageEl.textContent = payload.message || "Anti-gravity flight controls initialized.";
          
          // Trigger a micro card flash animation to indicate reload/change
          card.style.borderColor = "#00f0ff";
          setTimeout(() => { card.style.borderColor = ""; }, 1000);
        } catch (e) {
          console.error("Payload parse error:", e);
        }
      }
    }

    // Initial check on load
    window.addEventListener("DOMContentLoaded", updateDisplayPayload);

    // Watch for updates across tabs in real-time using storage event
    window.addEventListener("storage", (event) => {
      if (event.key === "gravity_orbital_payload") {
        updateDisplayPayload();
      }
    });
  </script>
</body>
</html>
