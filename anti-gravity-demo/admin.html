<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Control Panel - Administration</title>
  <!-- Google Fonts Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #05050d;
      --panel-bg: rgba(10, 10, 26, 0.4);
      --cyan-neon: #00f0ff;
      --purple-neon: #a020f0;
      --text-main: #f0f0ff;
      --text-muted: rgba(240, 240, 255, 0.6);
      --border-glow: rgba(0, 240, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #100a26 0%, #030308 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      position: relative;
      padding: 20px;
    }

    /* Ambient Space Glows */
    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 1;
      pointer-events: none;
    }

    .glow-cyan {
      top: -100px;
      left: -100px;
      background: rgba(0, 240, 255, 0.12);
    }

    .glow-purple {
      bottom: -150px;
      right: -100px;
      background: rgba(160, 32, 240, 0.12);
    }

    /* Grid Lines Background Overlay */
    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      pointer-events: none;
      z-index: 2;
    }

    /* Glassmorphic Panel Container */
    .control-panel {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      background: var(--panel-bg);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.6),
        inset 0 0 20px rgba(0, 240, 255, 0.05);
    }

    .panel-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .panel-icon {
      width: 50px;
      height: 50px;
      border: 1.5px dashed var(--cyan-neon);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      color: var(--cyan-neon);
      animation: rotateIcon 12s linear infinite;
    }

    @keyframes rotateIcon {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .panel-header h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan-neon), #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .panel-header p {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--cyan-neon);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .input-field:focus {
      border-color: var(--cyan-neon);
      background: rgba(0, 240, 255, 0.03);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
    }

    textarea.input-field {
      resize: none;
      height: 120px;
    }

    /* Glowing Publish Button */
    .launch-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan-neon) 0%, var(--purple-neon) 100%);
      color: #030308;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
    }

    .launch-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 240, 255, 0.5);
    }

    .launch-btn:active {
      transform: translateY(0);
    }

    /* Telemetry Panel feedback */
    .telemetry-log {
      margin-top: 25px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      font-family: monospace;
      font-size: 11px;
      color: #00ff66;
      max-height: 80px;
      overflow-y: auto;
      text-align: left;
    }

    .telemetry-log .line {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <!-- Background glows and grids -->
  <div class="glow-orb glow-cyan"></div>
  <div class="glow-orb glow-purple"></div>
  <div class="grid-overlay"></div>

  <!-- Central Glassmorphic Dashboard Panel -->
  <div class="control-panel">
    <div class="panel-header">
      <div class="panel-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <h1>Orbital Station</h1>
      <p>Launch custom anti-gravity broadcast payloads</p>
    </div>

    <form id="launchForm" onsubmit="publishPayload(event)">
      <div class="form-group">
        <label for="payloadTitle">Payload Title</label>
        <input type="text" id="payloadTitle" class="input-field" placeholder="Eg: ZERO G ENGAGED" required>
      </div>

      <div class="form-group">
        <label for="payloadMessage">Transmission Message</label>
        <textarea id="payloadMessage" class="input-field" placeholder="Enter message coordinates..." required></textarea>
      </div>

      <button type="submit" class="launch-btn">Launch into Orbit</button>
    </form>

    <!-- Telemetry Log Terminal -->
    <div class="telemetry-log" id="telemetryLog">
      <div class="line">&gt; SYSTEM READY. Waiting for coordinates...</div>
    </div>
  </div>

  <script>
    const logContainer = document.getElementById("telemetryLog");

    function addLog(text) {
      const timestamp = new Date().toLocaleTimeString();
      const line = document.createElement("div");
      line.className = "line";
      line.textContent = `[${timestamp}] > ${text}`;
      logContainer.appendChild(line);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function publishPayload(event) {
      event.preventDefault();
      
      const title = document.getElementById("payloadTitle").value.trim();
      const message = document.getElementById("payloadMessage").value.trim();

      const payload = {
        title,
        message,
        timestamp: new Date().toISOString()
      };

      try {
        // Write payload to browser LocalStorage
        localStorage.setItem("gravity_orbital_payload", JSON.stringify(payload));
        
        addLog(`TRANSMISSION LOADED: "${title}"`);
        addLog("LAUNCH SEQUENCE STARTING...");
        addLog("ORBIT STABILIZED. Broadcasting successful!");

        // Add active glowing visual feedback to input fields momentarily
        const fields = document.querySelectorAll(".input-field");
        fields.forEach(f => {
          f.style.borderColor = "#00ff66";
          setTimeout(() => { f.style.borderColor = ""; }, 1500);
        });

      } catch (err) {
        console.error("Local storage error:", err);
        addLog("CRITICAL ERROR: Launch failed to commit to LocalStorage.");
      }
    }
  </script>
</body>
</html>
