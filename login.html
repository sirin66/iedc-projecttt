<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RITU 2026 — Secure Entry Gate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating background shapes -->
  <div class="bg-glow-container">
    <div class="bg-glow-sphere-1"></div>
    <div class="bg-glow-sphere-2"></div>
  </div>

  <div class="viewport-centered">
    <div class="glass-panel login-card">
      <div style="margin-bottom: var(--space-lg);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: var(--space-sm); color: var(--white-pure);">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <h1 class="brand-title">Console Gate</h1>
        <p class="brand-subtitle">Student Authentication</p>
      </div>

      <form id="login-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label class="input-label" for="student-email">Student Email</label>
          <input type="email" id="student-email" class="input-field" placeholder="username@rit.ac.in" required autocomplete="username">
        </div>

        <div class="form-group" style="margin-bottom: var(--space-xl);">
          <label class="input-label" for="student-password">Security Password</label>
          <input type="password" id="student-password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary">
          Verify & Enter
        </button>
      </form>

      <div style="margin-top: var(--space-lg);">
        <p class="body-sub">Access requires a verified campus student record. Contact IEDC support for administrative credential mapping.</p>
      </div>
    </div>
  </div>

  <!-- Custom alert/toast popup container -->
  <div id="app-toast" class="toast-msg glass-panel">
    <span id="toast-text">Alert details...</span>
  </div>

  <!-- Firebase Legacy/Compat Web SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <!-- Main Application Controller Script -->
  <script src="app.js"></script>
</body>
</html>
