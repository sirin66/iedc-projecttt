<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RITU 2026 - Administration Console</title>
  
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Outfit', sans-serif;
      --white-pure: #ffffff;
      --muted-white: rgba(255, 255, 255, 0.6);
      --soft-purple: #8b6fd4;
      --success: #4AE88A;
      --warning: #E8C44A;
      --error: #E84A4A;
      --nova-yellow: #C8E84A;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #030611;
      color: #FFFFFF;
      font-family: var(--font-sans);
      overflow-x: hidden;
    }

    .desktop-admin-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Side Navigation Drawer Bar Styles */
    .admin-sidebar {
      width: 260px;
      background: rgba(255, 255, 255, 0.01);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      padding: var(--space-lg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .admin-sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 40px;
      font-family: var(--font-display);
    }

    .admin-sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px var(--space-md);
      border-radius: 10px;
      color: var(--muted-white);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .admin-nav-item:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--white-pure);
    }

    .admin-nav-item.active {
      background: rgba(139, 111, 212, 0.12);
      color: var(--soft-purple);
      border: 1px solid rgba(139, 111, 212, 0.2);
    }

    .admin-logout-btn {
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      color: #ff4d4d;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s;
    }
    .admin-logout-btn:hover {
      background: rgba(255, 77, 77, 0.1);
      border-color: #ff4d4d;
    }

    /* Core Workspace main content styles */
    .admin-main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .admin-breadcrumb {
      font-size: 11px;
      color: var(--muted-white);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .admin-page-title {
      font-size: 26px;
      font-weight: 900;
      margin-top: 4px;
      font-family: var(--font-display);
    }

    .admin-user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-wrapper {
      border: 2px solid var(--soft-purple);
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Table grid card design system */
    .admin-data-section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: var(--space-lg);
      margin-bottom: var(--space-xl);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .admin-data-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
    }

    .section-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--nova-yellow);
      font-weight: 700;
    }

    .admin-table-container {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .admin-table th {
      padding: var(--space-md);
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted-white);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .admin-table td {
      padding: var(--space-md);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 13px;
      vertical-align: middle;
    }

    .badge-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-approved { background: rgba(74, 232, 138, 0.15); color: var(--success); }
    .badge-pending { background: rgba(232, 196, 74, 0.15); color: var(--warning); }

    .admin-table-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 800;
      font-size: 10.5px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
      text-transform: uppercase;
    }
    
    .admin-table-btn-approve {
      background: var(--success);
      color: #030611;
      box-shadow: 0 0 10px rgba(74, 232, 138, 0.2);
    }
    .admin-table-btn-approve:hover {
      box-shadow: 0 0 15px rgba(74, 232, 138, 0.4);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <!-- Un-gated Main Console Layout -->
  <div class="desktop-admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-brand">
        <span style="color: var(--soft-purple);">RITU 2026</span> Console
      </div>
      <nav class="admin-sidebar-nav">
        <div class="admin-nav-item active" id="nav-tab-registrations">
          VIP Approvals
        </div>
      </nav>
      <button class="admin-logout-btn" onclick="window.location.href='index.html'">
        Back to Portal
      </button>
    </aside>

    <main class="admin-main-content">
      <header class="admin-topbar">
        <div>
          <span class="admin-breadcrumb">Console / Approvals</span>
          <h1 class="admin-page-title">Live Student Registrations</h1>
        </div>
        <div class="admin-user-profile">
          <span class="admin-user-name">Event Administrator</span>
          <div class="avatar-wrapper">
            <img class="avatar-img" src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?auto=format&fit=crop&w=100&q=80" alt="Admin">
          </div>
        </div>
      </header>

      <!-- Registrations Workspace -->
      <div id="workspace-registrations" style="width: 100%;">
        <section class="admin-data-section">
          <div class="admin-data-header">
            <span class="section-eyebrow">Student Registration Approval Submissions</span>
          </div>

          <div class="admin-table-container">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Student Info</th>
                  <th>KTU ID</th>
                  <th>Phone & Payment Ref</th>
                  <th>Event Title</th>
                  <th>Status</th>
                  <th style="text-align: right;">Action</th>
                </tr>
              </thead>
              <tbody id="student-table-body">
                <tr>
                  <td colspan="6" style="text-align: center; color: var(--muted-white); padding: 32px;">
                    Loading registrations collection live stream...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Firebase Scripts & EmailJS CDN dependencies at the bottom of the body -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <!-- Helper Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

  <!-- EmailJS Browser SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Core Controller Script -->
  <script src="app.js"></script>

</body>
</html>
