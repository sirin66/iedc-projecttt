<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register for Tournament - IEDC RIT</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #080810;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      position: relative;
      overflow-x: hidden;
    }

    .register-page-container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      z-index: 5;
      position: relative;
    }

    .register-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .register-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-display);
      font-weight: 950;
      font-size: 20px;
      margin-bottom: var(--space-xs);
    }

    .register-brand span {
      color: var(--coral-fire, #E8614A);
    }

    #eventDetailsCard {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }

    #eventDetailsCard h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 850;
      color: var(--white-pure);
      line-height: 1.3;
      margin-bottom: 8px;
    }

    #eventDetailsCard p {
      font-size: 13px;
      color: var(--muted-white);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    #eventDetailsCard p strong {
      color: var(--white-pure);
    }

    .price-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(200, 232, 74, 0.15);
      border: 1px solid rgba(200, 232, 74, 0.25);
      color: var(--nova-yellow);
      font-weight: 700;
      font-size: 12px;
      margin-top: 4px;
    }

    #paymentSection {
      margin-top: var(--space-md);
      padding: 20px;
      background: rgba(200, 232, 74, 0.03);
      border: 1px dashed rgba(200, 232, 74, 0.2);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    #paymentSection h3 {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--nova-yellow);
      letter-spacing: 0.5px;
      text-align: center;
    }

    .payment-instruction {
      font-size: 11px;
      line-height: 1.4;
      color: var(--muted-white);
      text-align: center;
      margin-bottom: 8px;
    }

    #qrcode-container {
      background: white;
      padding: 12px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 140px;
      height: 140px;
      margin: 0 auto var(--space-sm);
    }

    .btn-verify {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--nova-yellow, #C8E84A);
      color: #080810;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(200, 232, 74, 0.2);
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .btn-verify:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-verify:active {
      transform: translateY(0);
    }

    .success-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) 0;
    }

    .success-icon-wrapper {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(52, 168, 83, 0.1);
      border: 2px solid var(--success);
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-sm);
      box-shadow: 0 0 20px rgba(52, 168, 83, 0.25);
    }

    .btn-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted-white);
      text-decoration: none;
      margin-top: 16px;
      cursor: pointer;
    }

    .btn-back-link:hover {
      color: var(--white-pure);
    }
  </style>
</head>
<body>

  <!-- Background glows -->
  <div class="bg-glow-purple" style="opacity: 0.4;"></div>
  <div class="bg-glow-coral" style="opacity: 0.3;"></div>

  <div class="register-page-container">
    <div class="register-header">
      <div class="register-brand">
        <span>IEDC RIT</span> Platform
      </div>
      <p style="font-size: 12px; color: var(--muted-white);">Tournament Registration Portal</p>
    </div>

    <!-- Main Dynamic State Workspace Panel -->
    <div id="registration-workspace">
      
      <!-- Event Header Details block -->
      <div id="eventDetailsCard">
        <p style="text-align: center;">Establishing connection with secure event servers...</p>
      </div>

      <!-- Registration forms -->
      <form id="paymentVerificationForm" onsubmit="handleRegistrationSubmit(event)">
        
        <div class="input-group">
          <label class="input-label" for="studName">Full Name</label>
          <input type="text" id="studName" class="input-field" placeholder="Eg: SIRIN MATHEWS" required>
        </div>

        <div class="input-group">
          <label class="input-label" for="studEmail">Email Address</label>
          <input type="email" id="studEmail" class="input-field" placeholder="username@rit.ac.in" required>
        </div>

        <div class="input-group">
          <label class="input-label" for="studKtuId">KTU ID / Register Number</label>
          <input type="text" id="studKtuId" class="input-field" placeholder="Eg: RIT22CS089" required>
        </div>

        <div class="input-group">
          <label class="input-label" for="studPhone">Contact Number</label>
          <input type="tel" id="studPhone" class="input-field" placeholder="Eg: +91 9876543210" required>
        </div>

        <!-- Dynamic Payment Section -->
        <div id="paymentSection" style="display: none;">
          <h3>Scan & Pay to Register</h3>
          <p class="payment-instruction">മുകളിൽ കാണിച്ച തുക സ്കാൻ ചെയ്ത് അടച്ച ശേഷം UTR നമ്പർ താഴെ നൽകുക.</p>
          
          <div id="qrcode-container"></div> 

          <div class="input-group">
            <label class="input-label" for="utrNumber">Enter 12-Digit UPI UTR Number / Transaction ID</label>
            <input type="text" id="utrNumber" class="input-field" maxlength="12" pattern="\d{12}" placeholder="Eg: 345678901234">
          </div>
        </div>

        <button type="submit" class="btn-verify">Submit Registration</button>
      </form>
      
      <div style="text-align: center;">
        <a href="index.html" class="btn-back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back to Tournaments Feed
        </a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD4_h3WU2tkzE5G6jXimQUjYj2bUVliYUk",
      authDomain: "iedc-ux.firebaseapp.com",
      projectId: "iedc-ux",
      storageBucket: "iedc-ux.firebasestorage.app",
      messagingSenderId: "362260352304",
      appId: "1:362260352304:web:27374dbb9b51182807ccf5",
      measurementId: "G-2KH08MNGSX"
    };

    let useRealFirebase = sessionStorage.getItem("useRealFirebase") === "true";
    if (sessionStorage.getItem("useRealFirebase") === null) {
      useRealFirebase = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("YOUR_");
    }

    if (useRealFirebase) {
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
      } catch (error) {
        console.error("Firebase initialization failed:", error);
        useRealFirebase = false;
      }
    }

    const db = useRealFirebase ? firebase.firestore() : null;

    const urlParams = new URLSearchParams(window.location.search);
    const currentEventId = urlParams.get('id');
    let targetEventData = null;

    async function initRegistrationPage() {
      if (!currentEventId) {
        document.getElementById('eventDetailsCard').innerHTML = "<p style='color:#ff4d4d; text-align:center; font-weight:700;'>Error: No tournament selected. Please use a valid registration link.</p>";
        document.getElementById('paymentVerificationForm').style.display = "none";
        return;
      }

      // Try pre-filling student details if they have an active session
      const cachedUid = sessionStorage.getItem("loggedInUserUid");
      if (cachedUid) {
        try {
          if (useRealFirebase) {
            const studentSnap = await db.collection("students").doc(cachedUid).get();
            if (studentSnap.exists()) {
              prefillFields(studentSnap.data());
            }
          } else {
            const mockUsers = JSON.parse(localStorage.getItem("firebase_mock_users") || "{}");
            for (const email in mockUsers) {
              if (mockUsers[email].uid === cachedUid) {
                prefillFields(mockUsers[email].profileData);
                break;
              }
            }
          }
        } catch (e) {
          console.error("Failed to load cached profile:", e);
        }
      }

      try {
        // Fetch tournament data
        if (useRealFirebase) {
          const doc = await db.collection("tournaments").doc(currentEventId).get();
          if (doc.exists) {
            targetEventData = doc.data();
            renderEventUI(targetEventData);
          } else {
            document.getElementById('eventDetailsCard').innerHTML = "<p style='color:#ff4d4d; text-align:center; font-weight:700;'>Tournament not found.</p>";
            document.getElementById('paymentVerificationForm').style.display = "none";
          }
        } else {
          // Simulator Mode: Read mock tournaments
          const mockTournaments = JSON.parse(localStorage.getItem("firebase_mock_tournaments") || "[]");
          const found = mockTournaments.find(e => e.id === currentEventId || e.eventId === currentEventId);
          if (found) {
            targetEventData = found;
            renderEventUI(targetEventData);
          } else {
            document.getElementById('eventDetailsCard').innerHTML = "<p style='color:#ff4d4d; text-align:center; font-weight:700;'>Tournament not found (Simulator).</p>";
            document.getElementById('paymentVerificationForm').style.display = "none";
          }
        }
      } catch (error) {
        console.error("Error loading tournament details:", error);
        document.getElementById('eventDetailsCard').innerHTML = "<p style='color:#ff4d4d; text-align:center;'>Database communication failure. Please refresh.</p>";
      }
    }

    function prefillFields(profile) {
      if (!profile) return;
      if (profile.name) document.getElementById("studName").value = profile.name;
      if (profile.email) document.getElementById("studEmail").value = profile.email;
      if (profile.id || profile.registerNo) document.getElementById("studKtuId").value = profile.registerNo || profile.id;
      if (profile.phone) document.getElementById("studPhone").value = profile.phone;
    }

    function renderEventUI(event) {
      const title = event.title || event.event_title || "Tournament Registration";
      const speaker = event.host || "IEDC RIT";
      const priceVal = event.price || "Free";
      const upiAddress = "iedcrit@okaxis";

      document.getElementById('eventDetailsCard').innerHTML = `
        <h2>${title}</h2>
        <p><strong>Organizer/Host:</strong> ${speaker}</p>
        <p><strong>Prize Pool:</strong> ${event.prize || "TBD"}</p>
        <p><strong>Entry Type:</strong> ${event.hasTeam ? `Group Entry (Max ${event.maxTeamSize})` : "Individual Entry"}</p>
        <span class="price-tag">Entry Fee: ${priceVal}</span>
      `;

      // Extract amount digits
      const amountMatch = priceVal.match(/\d+/);
      const amount = amountMatch ? parseInt(amountMatch[0]) : 0;

      if (amount > 0) {
        document.getElementById('paymentSection').style.display = 'flex';
        document.getElementById('utrNumber').required = true;

        // UPI Deep Link construction
        const upiString = `upi://pay?pa=${upiAddress}&pn=IEDC%20RIT&am=${amount}&cu=INR`;

        // Render QR
        document.getElementById('qrcode-container').innerHTML = '';
        new QRCode(document.getElementById("qrcode-container"), {
          text: upiString,
          width: 120,
          height: 120,
          colorDark: "#080810",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } else {
        document.getElementById('paymentSection').style.display = 'none';
        document.getElementById('utrNumber').required = false;
      }
    }

    window.handleRegistrationSubmit = async function(event) {
      event.preventDefault();
      const submitBtn = event.target.querySelector("button[type='submit']");
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = "Registering...";

      // Check authentication state
      let loggedInUid = null;
      let loggedInEmail = null;

      if (useRealFirebase) {
        const user = firebase.auth().currentUser;
        if (user) {
          loggedInUid = user.uid;
          loggedInEmail = user.email;
        }
      } else {
        const cachedUid = sessionStorage.getItem("loggedInUserUid");
        if (cachedUid) {
          loggedInUid = cachedUid;
          const mockUsers = JSON.parse(localStorage.getItem("firebase_mock_users") || "{}");
          for (const email in mockUsers) {
            if (mockUsers[email].uid === cachedUid) {
              loggedInEmail = email;
              break;
            }
          }
        }
      }

      if (!loggedInUid) {
        alert("Please login first to complete registration!");
        window.location.href = `index.html?id=${currentEventId}`;
        return;
      }

      try {
        const studentName = document.getElementById("studName").value.trim();
        const studentEmail = document.getElementById("studEmail").value.trim().toLowerCase();
        const registerNo = document.getElementById("studKtuId").value.trim();
        const phone = document.getElementById("studPhone").value.trim();
        const utrNumber = document.getElementById("utrNumber").value.trim();

        // Validate UTR if paid
        const priceVal = targetEventData.price || "Free";
        const amountMatch = priceVal.match(/\d+/);
        const amount = amountMatch ? parseInt(amountMatch[0]) : 0;
        const upiAddress = "iedcrit@okaxis";

        if (amount > 0) {
          if (!/^\d{12}$/.test(utrNumber)) {
            alert("Please enter a valid 12-digit UPI UTR Transaction number.");
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
          }
        }

        const registrationId = "reg-" + Math.floor(Math.random() * 900000 + 100000);
        const registrationData = {
          registrationId,
          eventId: currentEventId,
          eventTitle: targetEventData.title || targetEventData.event_title || "",
          studentName,
          studentEmail: studentEmail || loggedInEmail,
          registerNo,
          phone,
          utrNumber: amount > 0 ? utrNumber : null,
          status: amount > 0 ? "Pending" : "Approved",
          createdAt: new Date().toISOString(),

          // User-specific database keys
          studentUid: loggedInUid,
          timestamp: useRealFirebase ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString()
        };

        if (useRealFirebase) {
          await db.collection("registrations").doc(registrationId).set(registrationData);
        }

        // Save to mock database locally in all cases for simulator support
        let mockRegistrations = JSON.parse(localStorage.getItem("firebase_mock_registrations") || "[]");
        mockRegistrations.push(registrationData);
        localStorage.setItem("firebase_mock_registrations", JSON.stringify(mockRegistrations));

        // Alert user and redirect back to index.html
        alert("Registration Submitted Successfully! Waiting for Admin verification.");
        window.location.href = "index.html";
      } catch (error) {
        console.error("Registration failed:", error);
        alert("Registration submission failed. Please try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    };

    window.addEventListener('DOMContentLoaded', initRegistrationPage);
  </script>
</body>
</html>
